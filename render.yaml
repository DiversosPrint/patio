services:
  - type: web
    name: patio-diversos-print
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /tmp/patio-data
      - key: PATIO_ADMIN_PASSWORD
        value: "1234"
      - key: PATIO_COORD_PASSWORD
        value: "4321"
