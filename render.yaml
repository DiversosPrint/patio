services:
  - type: web
    name: patio-diversos-print
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: COORD_PASSWORD
        generateValue: true
    disk:
      name: patio-diversos-data
      mountPath: /var/data
      sizeGB: 1
