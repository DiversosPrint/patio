services:
  - type: web
    name: patio-diversos-print
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /tmp/patio-data
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: COORD_PASSWORD
        generateValue: true
